# R5A fleet — 12 white-box + 4 black-box (post-2026-05-03 black-box refresh).
#
# Tier breakdown (DECISION_20260429_llama_addition §2.2 split-tier):
#   * Full-operator coverage (P_logprob + P_predict + P_extract):
#       10 white-box (5 Qwen2.5 + 4 Qwen3 + 1 GLM) + 4 black-box = 14
#   * P_logprob-only (white-box, but `p_predict: null`):
#       2 Llama-3 family models = 2
#   * P_logprob-eligible total = 12, P_predict-eligible total = 14, fleet = 16
#
# Authority: this file is the single source of truth for per-model and
# per-operator behavior. Adapters must read thinking control, prompt
# overlay policy, route locks, echo support, and offline fallbacks from
# here rather than duplicating them in code.
#
# Cutoff provenance: every `cutoff_date` carries a `cutoff_source` tag.
# Almost no vendor states a precise cutoff; treat all `community_paraphrase`
# and `operator_inferred` values as inputs to the path-E empirical cutoff
# probe rather than ground truth. See
# docs/DECISION_20260427_pcsg_redefinition.md and
# refine-logs/reviews/PCSG_PAIR_HUNT/open_source_landscape.md.
#
# Llama-3-8B-Instruct + Llama-3.1-8B-Instruct were added 2026-04-29 as
# the second confirmatory PCSG temporal pair (vendor-stated cutoffs:
# 2023-03 vs 2023-12). They run bf16 because no clean same-maintainer
# AWQ pair exists for Llama-3 + 3.1 (verification §3 of
# refine-logs/reviews/PCSG_PAIR_HUNT/llama_family_verification_20260429.md).
# Their Chinese-finance instruction-following is too weak for confirmatory
# P_predict (verification §6), so they carry `p_predict: null` and are
# excluded from E_CMMD / E_OR / E_NoOp / E_extract.
#
# `<TBD>` placeholders are pinned at run time per plan §10.1 and recorded
# in the run manifest. Do not commit a confirmatory run with `<TBD>`
# values still in place.
#
# tokenizer_sha (per DECISIONS.md decision #4, 2026-04-30): SHA-256 of
# `tokenizer.json` byte content as resolved at load time. This matches
# HF's blob-store filename for LFS-tracked tokenizers but NOT for git-
# tracked ones (HF uses git-blob SHA1 for non-LFS); the divergence is
# intentional, and `tokenizer_sha` MUST NOT be used as a cache lookup
# key. The pinner (scripts/ws1_pin_fleet.py) computes it via
# `_sha256_file_content` after resolving any HF-cache symlink.
#
# Black-box refresh (DECISION_20260503_blackbox_refresh): DeepSeek direct
# API moved from mutable `deepseek-chat` to explicit `deepseek-v4-pro`;
# OpenAI GPT snapshots are pinned to dated IDs; Anthropic Sonnet 4.6 uses
# the versioned Claude API ID `claude-sonnet-4-6`.
#
# HF gated-access preflight (2026-05-03): Llama access was verified with
# authenticated HEAD requests to `config.json`; Llama-3.1 uses the
# canonical HF repo id `meta-llama/Llama-3.1-8B-Instruct`.

