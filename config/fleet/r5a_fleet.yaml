# ---- PCSG pair registry ------------------------------------------------
#
# Per docs/DECISION_20260427_pcsg_redefinition.md, PCSG is computed on
# explicitly-declared pairs rather than inferred from tokenizer_family
# equality. Each pair declares the role assignment and the vocab
# intersection rule that compute_pcsg must enforce.
#
# `temporal` pairs identify the cutoff-exposure differential (primary
# confirmatory PCSG signal). `capacity` pairs hold cutoff fixed and
# vary parameter count (exploratory PCSG_capacity_curve).

pcsg_pairs:

  # Temporal (primary confirmatory) — operator-asserted cutoff
  - id: temporal_qwen_cross_version
    role: temporal
    early: qwen2.5-7b
    late: qwen3-8b
    tokenizer_compat: qwen2_class
    max_token_id_inclusive: 151664   # Qwen2.5 vocab ceiling; reject articles tokenizing to >=151665

  # Temporal (primary confirmatory) — vendor-stated cutoff
  # DECISION_20260429_llama_addition §2.3. The 128256 tiktoken core is
  # shared between Llama-3 (3.0) and Llama-3.1; 3.1 reuses high-ID slots
  # 3.0 left as reserved (`<|finetune_right_pad_id|>`, `<|eom_id|>`,
  # `<|python_tag|>`). Chinese article text never tokenizes to those IDs,
  # so 128255 is the safe ceiling for vocab-eligibility.
  - id: temporal_llama_cross_version
    role: temporal
    early: llama-3-8b-instruct       # vendor-stated cutoff 2023-03
    late: llama-3.1-8b-instruct      # vendor-stated cutoff 2023-12
    tokenizer_compat: llama3_class
    max_token_id_inclusive: 128255

  # Capacity (exploratory; same-cutoff within-family)
  - id: capacity_qwen2_5
    role: capacity
    members: [qwen2.5-1.5b, qwen2.5-3b, qwen2.5-7b, qwen2.5-14b, qwen2.5-32b]
    tokenizer_compat: qwen2_class
    max_token_id_inclusive: 151664

  - id: capacity_qwen3
    role: capacity
    members: [qwen3-4b, qwen3-8b, qwen3-14b, qwen3-32b]
    tokenizer_compat: qwen2_class
    max_token_id_inclusive: 151668
