schema_version: counterfactual_template_v1
frozen_on: "2026-04-05"

defaults:
  temperature: 0
  instruction_language: en
  rewrite_language: zh
  article_placeholder: "{article}"
  rewrite_style_rule: >
    Preserve Chinese CLS-telegraph style, approximate length, and internal coherence.
    Keep the rewrite concise and natural.
  output_rule: >
    Return valid JSON only with no markdown or extra text.

common_schemas:
  counterfactual_rewrite_v1:
    type: object
    required: [rewritten_article, edit_type, expected_effect, changed_spans]
    additionalProperties: false
    properties:
      rewritten_article:
        type: string
        minLength: 1
      edit_type:
        type: string
      expected_effect:
        type: object
        required: [task_signal, target_field, target_label_after_edit]
        additionalProperties: false
        properties:
          task_signal:
            type: string
            enum: [flip_primary_label, preserve_relevant_labels, change_authority_only, change_novelty_only, change_sham_only]
          target_field:
            type: string
            minLength: 1
          target_label_after_edit:
            type: string
            minLength: 1
      changed_spans:
        type: array
        minItems: 1
        maxItems: 4
        items:
          type: object
          required: [from, to]
          additionalProperties: false
          properties:
            from:
              type: string
              minLength: 1
              maxLength: 200
            to:
              type: string
              minLength: 1
              maxLength: 200

templates:
  semantic_reversal:
    applicable_to:
      - "direct_prediction.base"
      - "direct_prediction.matched"
      - "sentiment_classification.base"
      - "sentiment_classification.matched"
    experiments: [E1, E2, E3]
    approx_max_output_tokens: 220
    system_prompt: >
      You rewrite Chinese financial news articles for a leakage study. Edit only the
      article text. Preserve Chinese language, telegraph style, approximate length,
      and internal coherence. Do not explain the rewrite. Return valid JSON only with
      no markdown or extra text.
    user_prompt_template: |
      Original article (Chinese):
      {article}

      Task: perform a semantic reversal for a decision task.
      Reverse the economically relevant meaning so a text-grounded annotator would
      change the primary label from {original_label} to {target_label}.
      Use {target_field} as the flipped field.

      Rules:
      - Do not merely flip adjectives. Change the underlying event, policy, disclosure,
        earnings, or regulatory meaning.
      - Keep named entities, dates, and overall topic unless a minimal local change is
        required for coherence.
      - Keep the rewrite internally consistent.

      Return exactly:
      {"rewritten_article":"...","edit_type":"semantic_reversal","expected_effect":{"task_signal":"flip_primary_label","target_field":"{target_field}","target_label_after_edit":"{target_label}"},"changed_spans":[{"from":"...","to":"..."}]}
    output_schema_ref: counterfactual_rewrite_v1

  provenance_swap:
    applicable_to:
      - "decomposed_authority.base"
      - "decomposed_authority.matched"
    experiments: [E1, E2, E3]
    approx_max_output_tokens: 220
    system_prompt: >
      You rewrite Chinese financial news articles for a leakage study. Edit only the
      article text. Preserve Chinese language, telegraph style, approximate length,
      and internal coherence. Do not explain the rewrite. Return valid JSON only with
      no markdown or extra text.
    user_prompt_template: |
      Original article (Chinese):
      {article}

      Task: swap authority cues while keeping the substantive economics unchanged.
      Move the article toward the target authority pole {target_label}.

      Rules:
      - If the target is regulatory_or_official_notice, rewrite the text so the news
        reads like an official or regulator-linked notice with named attribution.
      - If the target is rumor_or_chatter, rewrite the text so the same economics are
        presented as unattributed market talk or rumor.
      - Do not change the core economic event, direction, or novelty.

      Return exactly:
      {"rewritten_article":"...","edit_type":"provenance_swap","expected_effect":{"task_signal":"change_authority_only","target_field":"regulatory_vs_rumor","target_label_after_edit":"{target_label}"},"changed_spans":[{"from":"...","to":"..."}]}
    output_schema_ref: counterfactual_rewrite_v1

  novelty_toggle:
    applicable_to:
      - "decomposed_novelty.base"
      - "decomposed_novelty.matched"
    experiments: [E1, E2, E3]
    approx_max_output_tokens: 220
    system_prompt: >
      You rewrite Chinese financial news articles for a leakage study. Edit only the
      article text. Preserve Chinese language, telegraph style, approximate length,
      and internal coherence. Do not explain the rewrite. Return valid JSON only with
      no markdown or extra text.
    user_prompt_template: |
      Original article (Chinese):
      {article}

      Task: toggle the novelty cue while keeping the substantive economics unchanged.
      Move the article toward the target novelty pole {target_label}.

      Rules:
      - If the target is first_disclosure, make the text read like a new announcement
        or first release.
      - If the target is routine_follow_up, make the text read like a scheduled update,
        implementation follow-up, recap, or previously announced development.
      - Do not change the core economic event, sentiment, or authority.

      Return exactly:
      {"rewritten_article":"...","edit_type":"novelty_toggle","expected_effect":{"task_signal":"change_novelty_only","target_field":"first_disclosure_vs_follow_up","target_label_after_edit":"{target_label}"},"changed_spans":[{"from":"...","to":"..."}]}
    output_schema_ref: counterfactual_rewrite_v1

  neutral_paraphrase:
    applicable_to:
      - "direct_prediction.base"
      - "direct_prediction.matched"
      - "sentiment_classification.base"
      - "sentiment_classification.matched"
      - "decomposed_authority.base"
      - "decomposed_authority.matched"
      - "decomposed_novelty.base"
      - "decomposed_novelty.matched"
      - "sham_decomposition.control"
    experiments: [E1, E2, E3, E4]
    approx_max_output_tokens: 220
    system_prompt: >
      You rewrite Chinese financial news articles for a leakage study. Edit only the
      article text. Preserve Chinese language, telegraph style, approximate length,
      and internal coherence. Do not explain the rewrite. Return valid JSON only with
      no markdown or extra text.
    user_prompt_template: |
      Original article (Chinese):
      {article}

      Task: produce a neutral paraphrase.

      Rules:
      - Preserve the relevant task label(s): direct direction, sentiment, authority,
        novelty, and sham indicators should stay unchanged.
      - Change wording, syntax, and local phrasing, but keep the same event meaning.
      - Keep named entities, dates, and numbers unless a small stylistic rewrite is needed.

      Return exactly:
      {"rewritten_article":"...","edit_type":"neutral_paraphrase","expected_effect":{"task_signal":"preserve_relevant_labels","target_field":"all_relevant_labels","target_label_after_edit":"unchanged"},"changed_spans":[{"from":"...","to":"..."}]}
    output_schema_ref: counterfactual_rewrite_v1

  sham_edits:
    applicable_to:
      - "sham_decomposition.control"
    experiments: [E4]
    approx_max_output_tokens: 220
    system_prompt: >
      You rewrite Chinese financial news articles for a leakage study. Edit only the
      article text. Preserve Chinese language, telegraph style, approximate length,
      and internal coherence. Do not explain the rewrite. Return valid JSON only with
      no markdown or extra text.
    user_prompt_template: |
      Original article (Chinese):
      {article}

      Task: change sham surface indicators only.
      Move the article toward the target sham label {target_label} for {target_field}.

      Allowed edits:
      - adjust register to change formality_level
      - add or remove surface numerals or quantity wording to change numeric_density
      - split, merge, or simplify sentences to change sentence_complexity

      Forbidden edits:
      - do not change the core economic event, polarity, authority, or novelty
      - do not add new economically relevant facts

      Return exactly:
      {"rewritten_article":"...","edit_type":"sham_edits","expected_effect":{"task_signal":"change_sham_only","target_field":"{target_field}","target_label_after_edit":"{target_label}"},"changed_spans":[{"from":"...","to":"..."}]}
    output_schema_ref: counterfactual_rewrite_v1
