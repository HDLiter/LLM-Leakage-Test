schema_version: counterfactual_template_v1
frozen_on: "2026-04-05-v2"

defaults:
  temperature: 0
  instruction_language: en
  rewrite_language: zh
  input_unit: article_target_pair
  article_placeholder: "{article}"
  target_placeholder: "{target}"
  target_type_placeholder: "{target_type}"
  rewrite_style_rule: >
    Preserve Chinese CLS-telegraph style, approximate length, and internal coherence.
    Keep the rewrite concise and natural.
  target_preservation_rule: >
    Preserve the provided target as the same entity or market object. Do not swap the
    target for another company, sector, or market aggregate, and keep the rewrite
    interpretable with respect to that target.
  output_rule: >
    Return valid JSON only with no markdown or extra text.

common_schemas:
  counterfactual_rewrite_v1:
    type: object
    required: [target_echo, rewritten_article, edit_type, expected_effect, changed_spans]
    additionalProperties: false
    properties:
      target_echo:
        type: string
        minLength: 1
        maxLength: 120
      rewritten_article:
        type: string
        minLength: 1
      edit_type:
        type: string
      expected_effect:
        type: object
        required: [task_signal, target_field, target_label_after_edit]
        additionalProperties: false
        properties:
          task_signal:
            type: string
            enum: [flip_primary_label, preserve_relevant_labels, change_authority_only, change_novelty_only, change_sham_only]
          target_field:
            type: string
            minLength: 1
          target_label_after_edit:
            type: string
            minLength: 1
      changed_spans:
        type: array
        minItems: 1
        items:
          type: object
          required: [from, to]
          additionalProperties: false
          properties:
            from:
              type: string
              minLength: 1
              maxLength: 200
            to:
              type: string
              minLength: 1
              maxLength: 200

templates:
  semantic_reversal:
    applicable_to:
      - "direct_prediction.base"
      - "direct_prediction.matched"
      - "sentiment_classification.base"
      - "sentiment_classification.matched"
      - "decomposed_impact.base"
      - "decomposed_impact.matched"
    experiments: [E1, E2, E3, E_pilot]
    approx_max_output_tokens: 240
    system_prompt: >
      You rewrite Chinese financial news articles for a leakage study. Edit only the
      article text for the provided target. Preserve Chinese language, telegraph
      style, approximate length, and internal coherence. Keep the target as the same
      referent. Do not explain the rewrite. Return valid JSON only with no markdown
      or extra text.
    user_prompt_template: |
      Original article (Chinese):
      {article}

      Target: {target} ({target_type})

      Task: perform a semantic reversal FOR {target}.
      Flip the economic meaning FOR {target} so a text-grounded annotator would change the primary label from {original_label} to {target_label}.
      Use {target_field} as the flipped field.

      Rules:
      - Preserve {target} as the same entity or market object named in the original.
      - Do not merely flip adjectives. Change the underlying event, policy, disclosure, earnings, or regulatory meaning as it applies to {target}.
      - Keep named entities, dates, and overall topic unless a minimal local change is required for coherence.
      - Keep the rewrite internally consistent.

      Return exactly:
      {"target_echo":"{target}","rewritten_article":"...","edit_type":"semantic_reversal","expected_effect":{"task_signal":"flip_primary_label","target_field":"{target_field}","target_label_after_edit":"{target_label}"},"changed_spans":[{"from":"...","to":"..."}]}
    output_schema_ref: counterfactual_rewrite_v1

  provenance_swap:
    applicable_to:
      - "decomposed_authority.base"
      - "decomposed_authority.matched"
    experiments: [E1, E2, E3]
    approx_max_output_tokens: 240
    system_prompt: >
      You rewrite Chinese financial news articles for a leakage study. Edit only the
      article text for the provided target. Preserve Chinese language, telegraph
      style, approximate length, and internal coherence. Keep the target as the same
      referent. Do not explain the rewrite. Return valid JSON only with no markdown
      or extra text.
    user_prompt_template: |
      Original article (Chinese):
      {article}

      Target: {target} ({target_type})

      Task: swap authority cues for claims about {target} while keeping the substantive economics for {target} unchanged.
      Move the article toward the target authority pole {target_label}.

      Rules:
      - Preserve {target} as the same entity or market object named in the original.
      - If the target is regulatory_or_official_notice, rewrite the text so the news about {target} reads like an official or regulator-linked notice with named attribution.
      - If the target is rumor_or_chatter, rewrite the text so the same economics for {target} are presented as unattributed market talk or rumor.
      - Do not change the core economic event, polarity, or disclosure framing for {target}.

      Return exactly:
      {"target_echo":"{target}","rewritten_article":"...","edit_type":"provenance_swap","expected_effect":{"task_signal":"change_authority_only","target_field":"regulatory_vs_rumor","target_label_after_edit":"{target_label}"},"changed_spans":[{"from":"...","to":"..."}]}
    output_schema_ref: counterfactual_rewrite_v1

  novelty_toggle:
    applicable_to:
      - "decomposed_novelty.base"
      - "decomposed_novelty.matched"
    experiments: [E1, E2, E3]
    approx_max_output_tokens: 240
    system_prompt: >
      You rewrite Chinese financial news articles for a leakage study. Edit only the
      article text for the provided target. Preserve Chinese language, telegraph
      style, approximate length, and internal coherence. Keep the target as the same
      referent. Do not explain the rewrite. Return valid JSON only with no markdown
      or extra text.
    user_prompt_template: |
      Original article (Chinese):
      {article}

      Target: {target} ({target_type})

      Task: toggle the disclosure framing for {target} while keeping the substantive economics for {target} unchanged.
      Move the article toward the target disclosure frame {target_label}.

      Rules:
      - Preserve {target} as the same entity or market object named in the original.
      - Rewrite framing cues only. Judge only how the article frames the disclosure for {target}, not whether the event truly appeared before elsewhere.
      - If the target is new_announcement, make the text read like a new announcement, first release, or newly disclosed development for {target}.
      - If the target is update_or_follow_up, make the text read like an update, implementation follow-up, recap, or previously announced development for {target}.
      - Do not change the core economic event, authority cues, or polarity for {target}.

      Return exactly:
      {"target_echo":"{target}","rewritten_article":"...","edit_type":"novelty_toggle","expected_effect":{"task_signal":"change_novelty_only","target_field":"disclosure_frame","target_label_after_edit":"{target_label}"},"changed_spans":[{"from":"...","to":"..."}]}
    output_schema_ref: counterfactual_rewrite_v1

  neutral_paraphrase:
    applicable_to:
      - "direct_prediction.base"
      - "direct_prediction.matched"
      - "sentiment_classification.base"
      - "sentiment_classification.matched"
      - "decomposed_authority.base"
      - "decomposed_authority.matched"
      - "decomposed_novelty.base"
      - "decomposed_novelty.matched"
      - "decomposed_impact.base"
      - "decomposed_impact.matched"
      - "sham_decomposition.control"
    experiments: [E1, E2, E3, E4, E_pilot]
    approx_max_output_tokens: 240
    system_prompt: >
      You rewrite Chinese financial news articles for a leakage study. Edit only the
      article text for the provided target. Preserve Chinese language, telegraph
      style, approximate length, and internal coherence. Keep the target as the same
      referent. Do not explain the rewrite. Return valid JSON only with no markdown
      or extra text.
    user_prompt_template: |
      Original article (Chinese):
      {article}

      Target: {target} ({target_type})

      Task: produce a neutral paraphrase that preserves the task-relevant meaning FOR {target}.

      Rules:
      - Preserve {target} as the same entity or market object named in the original.
      - Preserve the relevant task label(s) for {target}: direct direction, sentiment, authority, novelty, impact channels (fund_impact, shock_impact), and sham indicators should stay unchanged for the applicable task.
      - Change wording, syntax, and local phrasing, but keep the same event meaning for {target}.
      - Keep named entities, dates, and numbers unless a small stylistic rewrite is needed.
      - Before finalizing, check that the rewrite still supports the same target-specific label(s).

      Return exactly:
      {"target_echo":"{target}","rewritten_article":"...","edit_type":"neutral_paraphrase","expected_effect":{"task_signal":"preserve_relevant_labels","target_field":"all_relevant_labels","target_label_after_edit":"unchanged"},"changed_spans":[{"from":"...","to":"..."}]}
    output_schema_ref: counterfactual_rewrite_v1

  sham_edits:
    applicable_to:
      - "sham_decomposition.control"
    experiments: [E4]
    approx_max_output_tokens: 240
    system_prompt: >
      You rewrite Chinese financial news articles for a leakage study. Edit only the
      article text for the provided target. Preserve Chinese language, telegraph
      style, approximate length, and internal coherence. Keep the target as the same
      referent. Do not explain the rewrite. Return valid JSON only with no markdown
      or extra text.
    user_prompt_template: |
      Original article (Chinese):
      {article}

      Target: {target} ({target_type})

      Task: change sham surface indicators for {target} only.
      Move the article toward the target sham label {target_label} for {target_field}.

      Allowed edits:
      - adjust register to change formality_level
      - add or remove surface numerals or quantity wording to change numeric_density
      - split, merge, or simplify sentences to change sentence_complexity

      Forbidden edits:
      - preserve {target} as the same entity or market object named in the original
      - if the article is mixed-topic, edit the sentences most relevant to {target} first
      - do not change the core economic event, polarity, authority, novelty, or impact channels for {target}
      - do not add new economically relevant facts

      Return exactly:
      {"target_echo":"{target}","rewritten_article":"...","edit_type":"sham_edits","expected_effect":{"task_signal":"change_sham_only","target_field":"{target_field}","target_label_after_edit":"{target_label}"},"changed_spans":[{"from":"...","to":"..."}]}
    output_schema_ref: counterfactual_rewrite_v1
