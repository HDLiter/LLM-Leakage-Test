  "decomposed_impact.base":
    task_family: decomposed_impact
    variant: base
    experiments: [E6]
    approx_max_output_tokens: 180
    system_prompt: >
      You are an annotation model in a leakage audit of Chinese financial news. Use
      only the provided Chinese article and the provided target. Do not use outside
      knowledge, hindsight, later market outcomes, realized returns, or any events
      after publication. Extract target-specific impact channels only. Do not predict
      realized price movement or return. Return valid JSON only with no markdown or
      extra text.
    user_prompt_template: |
      Article (Chinese):
      {article}

      Target: {target} ({target_type})

      Task: extract target-specific impact signals for {target} only.

      Return exactly:
      {"target_echo":"{target}","fund_impact":"strong_negative|negative|neutral|positive|strong_positive","shock_impact":"strong_negative|negative|neutral|positive|strong_positive","evidence":[{"quote":"...","supports":["fund_impact"]},{"quote":"...","supports":["shock_impact"]}],"confidence":0-100}

      Rules:
      - Judge the fundamental and sentiment impact CHANNELS on {target}, not the realized price movement or return.
      - `target_echo` must exactly repeat the target name.
      - `fund_impact` is the fundamental or structural impact on {target}, such as competitive position, regulation, demand, supply, margins, or cost structure.
      - `shock_impact` is the short-run sentiment or reaction pressure on {target}, such as panic, relief, excitement, or headline shock.
      - Use 1-2 short verbatim Chinese quotes.
      - Use "neutral" if the article gives no clear impact signal for a channel.
    output_schema:
      type: object
      required: [target_echo, fund_impact, shock_impact, evidence, confidence]
      additionalProperties: false
      properties:
        target_echo:
          type: string
          minLength: 1
          maxLength: 120
        fund_impact:
          type: string
          enum: [strong_negative, negative, neutral, positive, strong_positive]
        shock_impact:
          type: string
          enum: [strong_negative, negative, neutral, positive, strong_positive]
        evidence:
          type: array
          minItems: 1
          maxItems: 2
          items:
            type: object
            required: [quote, supports]
            additionalProperties: false
            properties:
              quote:
                type: string
                minLength: 1
                maxLength: 120
              supports:
                type: array
                minItems: 1
                maxItems: 2
                items:
                  type: string
                  enum: [fund_impact, shock_impact]
        confidence:
          type: integer
          minimum: 0
          maximum: 100

