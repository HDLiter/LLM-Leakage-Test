      Rules:
      - If the article is mostly about {target}, judge the article overall; otherwise focus on the lines that discuss {target}.
      - `target_echo` must exactly repeat the target name.
      - `formality_level` judges register only, not credibility.
      - `numeric_density` judges the surface presence of digits or quantity wording only.
      - `sentence_complexity` judges syntax only, not economics.
