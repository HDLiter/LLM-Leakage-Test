      Rules:
      - Evidence must be 1-2 short verbatim Chinese quotes from the article.
      - If the article is mixed or insufficient, use "neutral".
    output_schema:
      type: object
      required: [sentiment, confidence, evidence]
      additionalProperties: false
      properties:
        sentiment:
          type: string
          enum: [positive, negative, neutral]
        confidence:
          type: integer
          minimum: 0
          maximum: 100
        evidence:
          type: array
          minItems: 1
          maxItems: 2
          items:
            type: string
            minLength: 1
            maxLength: 80

  "sentiment_classification.matched":
    task_family: sentiment_classification
