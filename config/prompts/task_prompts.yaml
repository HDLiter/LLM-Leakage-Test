schema_version: prompt_schema_v1
frozen_on: "2026-04-05-v2"

defaults:
  temperature: 0
  instruction_language: en
  article_language: zh
  input_unit: article_target_pair
  article_placeholder: "{article}"
  target_placeholder: "{target}"
  target_type_placeholder: "{target_type}"
  target_resolution_rule: >
    Each annotation is conditioned on the provided target and target_type. Judge only
    the provided target. Do not substitute another company, sector, or broad market
    proxy even if the article also mentions them.
  evidence_rule: >
    Copy 1-2 short verbatim Chinese quotes from the article. Do not fabricate
    evidence. Each quote must stay within 120 characters.

common_schemas:
  matched_slots_v1:
    type: object
    required: [target_echo, slot_1, slot_2, slot_3, evidence, confidence]
    additionalProperties: false
    properties:
      target_echo:
        type: string
        minLength: 1
        maxLength: 120
      slot_1:
        type: string
      slot_2:
        type: string
      slot_3:
        type: string
      evidence:
        type: array
        minItems: 1
        maxItems: 2
        items:
          type: object
          required: [quote, supports]
          additionalProperties: false
          properties:
            quote:
              type: string
              minLength: 1
              maxLength: 120
            supports:
              type: array
              minItems: 1
              maxItems: 3
              items:
                type: string
                enum: [slot_1, slot_2, slot_3]
      confidence:
        type: integer
        minimum: 0
        maximum: 100

prompts:
  "direct_prediction.base":
    task_family: direct_prediction
    variant: base
    experiments: [E1, E2, E3]
    approx_max_output_tokens: 120
    system_prompt: >
      You are an annotation model in a leakage audit of Chinese financial news. Use
      only the provided Chinese article and the provided target. Do not use outside
      knowledge, hindsight, later market outcomes, realized returns, or any events
      after publication. Judge only what the article implies for the named target. If
      the article does not support a directional call for that target, choose neutral.
      Return valid JSON only with no markdown or extra text.
    user_prompt_template: |
      Article (Chinese):
      {article}

      Target: {target} ({target_type})

      Task: predict the immediate price direction implied by this article FOR {target}.

      Return exactly:
      {"target_echo":"{target}","direction":"up|down|neutral","confidence":0-100,"evidence":["quote_1","quote_2"]}

      Rules:
      - Judge only the provided target, not another entity or a broader market proxy.
      - `target_echo` must exactly repeat the target name.
      - Evidence must be 1-2 short verbatim Chinese quotes from the article.
      - If the article is mixed, hedged, or insufficient for {target}, use "neutral".
    output_schema:
      type: object
      required: [target_echo, direction, confidence, evidence]
      additionalProperties: false
      properties:
        target_echo:
          type: string
          minLength: 1
          maxLength: 120
        direction:
          type: string
          enum: [up, down, neutral]
        confidence:
          type: integer
          minimum: 0
          maximum: 100
        evidence:
          type: array
          minItems: 1
          maxItems: 2
          items:
            type: string
            minLength: 1
            maxLength: 120

  "direct_prediction.matched":
    task_family: direct_prediction
    variant: matched
    experiments: [E3]
    approx_max_output_tokens: 180
    system_prompt: >
      You are an annotation model in a leakage audit of Chinese financial news. Use
      only the provided Chinese article and the provided target. Do not use outside
      knowledge, hindsight, later market outcomes, realized returns, or any events
      after publication. Ground every slot in short verbatim evidence from the
      article. If the text is insufficient, use the neutral or unclear option. Return
      valid JSON only with no markdown or extra text.
    user_prompt_template: |
      Article (Chinese):
      {article}

      Target: {target} ({target_type})

      Task: use the common matched schema and fill all three slots FOR {target} from the article only.
      Slot meanings for this prompt:
      - slot_1 = direction: up | down | neutral
      - slot_2 = framing_certainty: definitive | qualified | speculative | mixed | unclear
      - slot_3 = strength: strong | moderate | weak | unclear

      Return exactly:
      {"target_echo":"{target}","slot_1":"...","slot_2":"...","slot_3":"...","evidence":[{"quote":"...","supports":["slot_1"]},{"quote":"...","supports":["slot_2","slot_3"]}],"confidence":0-100}

      Rules:
      - Judge only the provided target, not another entity or a broader market proxy.
      - `target_echo` must exactly repeat the target name.
      - `framing_certainty` captures how firmly the article speaks about {target}: definitive = direct confirmed claim, qualified = hedged but leaning, speculative = rumor or possibility language, mixed = both firm and hedged cues, unclear = not supported.
      - Use 1-2 short verbatim Chinese quotes.
      - If only one quote is needed, keep one evidence item.
    output_schema_ref: matched_slots_v1
    slot_semantics:
      slot_1:
        meaning: direction
        allowed_values: [up, down, neutral]
      slot_2:
        meaning: framing_certainty
        allowed_values: [definitive, qualified, speculative, mixed, unclear]
      slot_3:
        meaning: strength
        allowed_values: [strong, moderate, weak, unclear]

