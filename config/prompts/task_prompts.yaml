schema_version: prompt_schema_v1
frozen_on: "2026-04-05"

defaults:
  temperature: 0
  instruction_language: en
  article_language: zh
  input_unit: single_article
  article_placeholder: "{article}"
  target_resolution_rule: >
    For direct prediction and sentiment classification, if the article is company- or
    sector-specific, judge the most directly affected Chinese listed stock or sector;
    if the article is macro or policy-wide, judge the broad A-share market.
  evidence_rule: >
    Copy 1-2 short verbatim Chinese quotes from the article. Do not fabricate evidence.

common_schemas:
  matched_slots_v1:
    type: object
    required: [slot_1, slot_2, slot_3, evidence, confidence]
    additionalProperties: false
    properties:
      slot_1:
        type: string
      slot_2:
        type: string
      slot_3:
        type: string
      evidence:
        type: array
        minItems: 1
        maxItems: 2
        items:
          type: object
          required: [quote, supports]
          additionalProperties: false
          properties:
            quote:
              type: string
              minLength: 1
              maxLength: 120
            supports:
              type: array
              minItems: 1
              maxItems: 3
              items:
                type: string
                enum: [slot_1, slot_2, slot_3]
      confidence:
        type: integer
        minimum: 0
        maximum: 100

prompts:
  "direct_prediction.base":
    task_family: direct_prediction
    variant: base
    experiments: [E1, E2, E3]
    approx_max_output_tokens: 96
    system_prompt: >
      You are an annotation model in a leakage audit of Chinese financial news. Use
      only the provided article. Do not use outside knowledge, hindsight, prices, or
      events after publication. If the text does not support a directional call,
      choose neutral. Return valid JSON only with no markdown or extra text.
    user_prompt_template: |
      Article (Chinese):
      {article}

      Task: predict the immediate price direction implied by this article.
      Use the most directly affected Chinese listed stock or sector; if the article
      is macro or policy-wide, use the broad A-share market.
      Use only the article text, not what actually happened later.

      Return exactly:
      {"direction":"up|down|neutral","confidence":0-100,"evidence":["quote_1","quote_2"]}

      Rules:
      - Evidence must be 1-2 short verbatim Chinese quotes from the article.
      - If the article is mixed or insufficient, use "neutral".
    output_schema:
      type: object
      required: [direction, confidence, evidence]
      additionalProperties: false
      properties:
        direction:
          type: string
          enum: [up, down, neutral]
        confidence:
          type: integer
          minimum: 0
          maximum: 100
        evidence:
          type: array
          minItems: 1
          maxItems: 2
          items:
            type: string
            minLength: 1
            maxLength: 80

  "direct_prediction.matched":
    task_family: direct_prediction
    variant: matched
    experiments: [E3]
    approx_max_output_tokens: 150
    system_prompt: >
      You are an annotation model in a leakage audit of Chinese financial news. Use
      only the provided article. Do not use outside knowledge, hindsight, prices, or
      events after publication. Ground every slot in short verbatim evidence from the
      article. If the text is insufficient, use the neutral or unclear option. Return
      valid JSON only with no markdown or extra text.
    user_prompt_template: |
      Article (Chinese):
      {article}

      Task: use the common matched schema and fill all three slots from the article only.
      Slot meanings for this prompt:
      - slot_1 = direction: up | down | neutral
      - slot_2 = scope: company | sector | broad_market | unclear
      - slot_3 = strength: strong | moderate | weak | unclear

      Return exactly:
      {"slot_1":"...","slot_2":"...","slot_3":"...","evidence":[{"quote":"...","supports":["slot_1"]},{"quote":"...","supports":["slot_2","slot_3"]}],"confidence":0-100}

      Rules:
      - Use 1-2 short verbatim Chinese quotes.
      - If only one quote is needed, keep one evidence item.
    output_schema_ref: matched_slots_v1
    slot_semantics:
      slot_1:
        meaning: direction
        allowed_values: [up, down, neutral]
      slot_2:
        meaning: scope
        allowed_values: [company, sector, broad_market, unclear]
      slot_3:
        meaning: strength
        allowed_values: [strong, moderate, weak, unclear]

  "sentiment_classification.base":
    task_family: sentiment_classification
    variant: base
    experiments: [E1, E2, E3]
    approx_max_output_tokens: 96
    system_prompt: >
      You are an annotation model in a leakage audit of Chinese financial news. Use
